name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build, typecheck, and test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies (no lockfile in repo)
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify build artifacts
        run: |
          test -f dist/index.js || (echo "missing dist/index.js" && exit 1)
          test -f dist/plugin.js || (echo "missing dist/plugin.js" && exit 1)
          test -f dist/task-plan.js || (echo "missing dist/task-plan.js" && exit 1)
          test -f dist/index.d.ts || (echo "missing dist/index.d.ts" && exit 1)

  publish-dry-run:
    name: npm pack dry-run
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - run: npm pack --dry-run
